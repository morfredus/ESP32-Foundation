; Exemple capteur — montre comment lire une valeur périodiquement, la
; persister/logguer, et l'exposer via une route HTTP JSON, avec un intervalle
; de lecture configurable et sauvegardé en NVS.
;
; lib_extra_dirs pointe vers le framework : PlatformIO compile ses services
; comme une bibliothèque, sans dupliquer le code. Le projet ne fournit que
; son main.cpp et son module métier.

[platformio]
description  = Exemple capteur basé sur ESP32-Foundation
default_envs = esp32s3_n16r8

[env:esp32s3_n16r8]
platform      = espressif32
board         = esp32-s3-devkitc-1-n16r8v
framework     = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

lib_extra_dirs = ../../

build_unflags = -std=gnu++11 -std=gnu++14
build_flags =
    -std=gnu++17
    -D PROJECT_NAME='"Sensor-Example"'
    -I ../../src

lib_deps =
    bblanchon/ArduinoJson@^7.0.0

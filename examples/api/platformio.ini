; Exemple API — montre les principales capacités de routage de WebRouter :
; route GET simple, route GET avec paramètre de requête, route POST avec
; corps JSON et validation. Aucun capteur ici : seulement de la pédagogie
; sur le routage HTTP.
;
; lib_extra_dirs pointe vers le framework : PlatformIO compile ses services
; comme une bibliothèque, sans dupliquer le code. Le projet ne fournit que
; son main.cpp et son module métier.

[platformio]
description  = Exemple API/routage basé sur ESP32-Foundation
default_envs = esp32s3_n16r8

[env:esp32s3_n16r8]
platform      = espressif32
board         = esp32-s3-devkitc-1-n16r8v
framework     = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

lib_extra_dirs = ../../

build_unflags = -std=gnu++11 -std=gnu++14
build_flags =
    -std=gnu++17
    -D PROJECT_NAME='"Api-Example"'
    -I ../../src

lib_deps =
    bblanchon/ArduinoJson@^7.0.0

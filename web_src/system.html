<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Système</title><link rel="stylesheet" href="style.css"></head><body><main><div class="card"><h2>Informations système</h2><table id="tbl"><tbody></tbody></table></div></main><script src="menu.js"></script><script>
function refresh() {
  fetch('/api/system').then(function (r) { return r.json(); }).then(function (d) {
    var tbody = document.querySelector('#tbl tbody');
    tbody.innerHTML = '';
    Object.keys(d).forEach(function (k) {
      var tr = document.createElement('tr');
      var v = d[k];
      if (typeof v === 'object') v = JSON.stringify(v);
      tr.innerHTML = '<td>' + k + '</td><td>' + v + '</td>';
      tbody.appendChild(tr);
    });
  });
}
refresh();
setInterval(refresh, 5000);
</script></body></html>

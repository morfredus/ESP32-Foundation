; ESP32-Foundation — PlatformIO Project Configuration File
;
; Framework générique ESP32 (core + services), réutilisable pour tout projet.
; Le code métier vit dans src/modules/ — il ne doit jamais être ajouté ici.

[platformio]
description  = ESP32-Foundation - Framework applicatif générique pour projets ESP32
default_envs = esp32s3_n16r8

[env:esp32s3_n16r8]
platform      = espressif32
board         = esp32-s3-devkitc-1-n16r8v
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

board_build.usb_mode        = "cdc"
board_build.usb_cdc_on_boot = 1
board_build.filesystem      = littlefs

; Génère project_config.h (BUILD_DATE/BUILD_TIME/GIT_COMMIT/PROJECT_VERSION)
; et minifie les assets web avant chaque compilation.
extra_scripts =
    pre:tools/build_info.py
    pre:tools/minify_web.py

build_unflags =
    -std=gnu++11
    -std=gnu++14

build_flags =
    -std=gnu++17
    -D PROJECT_NAME='"ESP32-Foundation"'

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
